name: Build, Configure, and Push Tutor Open edX Image

on:
  push:
    branches:
      - master  # Запуск при пуше в master

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind  # Запускаем Docker-in-Docker

    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v3

      - name: 🛠️ Сборка Docker-образа с зависимостями (без запуска Open edX)
        run: |
          docker build -t tutor-setup .

      - name: 🚀 Запуск контейнера для настройки Open edX (с DinD)
        run: |
          docker run -d --privileged --name tutor-setup docker:dind
          sleep 5

      - name: 🐳 Запуск Docker внутри контейнера (чтобы работал Tutor)
        run: |
          docker exec tutor-setup dockerd &
          sleep 15
          docker exec tutor-setup docker ps  # Проверяем, что Docker работает внутри контейнера

      - name: 🌍 Настраиваем Tutor Open edX (без интерактивного режима)
        run: |
          docker exec tutor-setup tutor config save --set LMS_HOST=uni-books.online \
                                                     --set CMS_HOST=studio.uni-books.online \
                                                     --set PLATFORM_NAME="Uni-Books Online" \
                                                     --set CONTACT_EMAIL="contact@uni-books.online" \
                                                     --set DEFAULT_LANGUAGE="en" \
                                                     --set ENABLE_HTTPS=true

      - name: 🚀 Запускаем Open edX внутри контейнера
        run: |
          docker exec tutor-setup tutor local start

      - name: 🛑 Останавливаем Open edX перед созданием образа
        run: |
          docker exec tutor-setup tutor local stop

      - name: 📦 Создаем финальный образ с полностью настроенным Open edX
        run: |
          docker commit tutor-setup mistervkln/tutor-openedx:latest-v12

      - name: 🔑 Логин в Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 🚢 Публикация готового образа в Docker Hub
        run: |
          docker push mistervkln/tutor-openedx:latest-v12
