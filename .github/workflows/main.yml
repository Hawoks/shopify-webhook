name: Build, Configure, and Push Tutor Open edX Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v3

      - name: 🛠️ Сборка Docker-образа с Tutor
        run: |
          docker build -t tutor-setup .

      - name: 🚀 Запуск контейнера для настройки Open edX
        run: |
          docker run -d --privileged --name tutor-setup -v /var/run/docker.sock:/var/run/docker.sock tutor-setup
          sleep 5

      - name: 🔍 Проверяем, что Caddyfile существует
        run: |
          docker exec tutor-setup bash -c 'if [ ! -f /root/.local/share/tutor/env/apps/caddy/Caddyfile ]; then
            echo "Caddyfile не найден, создаем пустой"
            mkdir -p /root/.local/share/tutor/env/apps/caddy
            touch /root/.local/share/tutor/env/apps/caddy/Caddyfile
          fi'

      - name: 🔧 Пересохраняем конфигурацию Tutor
        run: |
          docker exec tutor-setup tutor config save --set LMS_HOST=uni-books.online \
                                                     --set CMS_HOST=studio.uni-books.online \
                                                     --set PLATFORM_NAME="Uni-Books Online" \
                                                     --set CONTACT_EMAIL="contact@uni-books.online" \
                                                     --set DEFAULT_LANGUAGE="en" \
                                                     --set ENABLE_HTTPS=true

      - name: 🚀 Запускаем Open edX внутри контейнера (без интерактивного ввода)
        run: |
          docker exec tutor-setup tutor local start

      - name: 🛑 Останавливаем Open edX перед созданием образа
        run: |
          docker exec tutor-setup tutor local stop

      - name: 📦 Создаем финальный образ с полностью настроенным Open edX
        run: |
          docker commit tutor-setup mistervkln/tutor-openedx:latest-v4

      - name: 🔑 Логин в Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 🚢 Публикация готового образа в Docker Hub
        run: |
          docker push mistervkln/tutor-openedx:latest-v4
